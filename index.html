<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Películas</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "./script.js": "./script.js",
                "./uiHandler.js": "./uiHandler.js",
                "./htmlGenerator.js": "./htmlGenerator.js",
                "./basicHtmlGenerator.js": "./basicHtmlGenerator.js"
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Buscar Series</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Escribe el nombre de una serie...">
            <input type="number" id="seasonInput" placeholder="Temp (opcional)" min="1" value="">
            <button id="searchButton">Buscar</button>
        </div>

        <!-- New Template Selection -->
        <fieldset class="template-selection">
            <legend>Seleccionar Plantilla:</legend>
            <label>
                <input type="radio" name="template" value="cinemax" checked> CINEMAX Style
            </label>
            <label>
                <input type="radio" name="template" value="basic"> Basic Style
            </label>
        </fieldset>
        <!-- End New Template Selection -->


        <div id="resultsContainer" class="results-container">
            <!-- Show results will be displayed here -->
        </div>
        <div class="code-box">
            <label for="sourceCodeInput">Código Fuente:</label>
            <textarea id="sourceCodeInput" placeholder="Introduce tu código aquí..." readonly></textarea>
            <button id="copyCodeButton">Copiar Código</button>
        </div>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
